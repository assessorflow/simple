name: DeepTeam Red Teaming

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  OPENAI_API_KEY: ${{ secrets.LITELLM_PROXY_API_KEY }}
  OPENAI_API_BASE: ${{ vars.OPENAI_CHAT_ENDPOINT }}
  LITELLM_MODEL_NAME: ${{ vars.LITELLM_MODEL_NAME }}

jobs:
  deepteam-scan:
    name: DeepTeam Red Team Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra redteam

      - name: Run DeepTeam scan
        run: uv run python scripts/run_deepteam.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepteam-results
          path: deepteam_results/
          retention-days: 30
