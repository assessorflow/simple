name: PyRIT Red Teaming

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  OPENAI_CHAT_ENDPOINT: ${{ vars.OPENAI_CHAT_ENDPOINT }}
  OPENAI_CHAT_KEY: ${{ secrets.LITELLM_PROXY_API_KEY }}
  OPENAI_CHAT_MODEL: ${{ vars.LITELLM_MODEL_NAME }}

jobs:
  pyrit-scan:
    name: PyRIT Red Team Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra redteam

      - name: Run PyRIT scan
        run: uv run python scripts/run_pyrit.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyrit-results
          path: pyrit_results/
          retention-days: 30
