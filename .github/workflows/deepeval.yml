name: DeepEval Quality Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  USE_LITELLM: "true"
  LITELLM_PROXY_API_BASE: ${{ vars.LITELLM_PROXY_API_BASE }}
  LITELLM_PROXY_API_KEY: ${{ secrets.LITELLM_PROXY_API_KEY }}
  LITELLM_MODEL_NAME: ${{ vars.DEPEVAL_MODEL_NAME }}

jobs:
  deepeval-tests:
    name: Run DeepEval Quality Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run DeepEval tests
        run: |
          uv run pytest tests/ \
            -v \
            --tb=short \
            --asyncio-mode=auto \
            -m deepeval

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-results
          path: .depeval/
          retention-days: 30
