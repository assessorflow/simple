name: Agent Red Teaming

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  redteam-scan:
    name: Red Team Agent Endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra test

      - name: Start agent
        run: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 &
        sleep: 5

      - name: Run red team
        run: uv run python scripts/run_redteam.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-results
          path: redteam_results/
          retention-days: 30
