name: Garak Red Teaming

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      probes:
        description: 'Comma-separated probes (leave empty for default)'
        required: false
        default: ''

env:
  LITELLM_PROXY_API_BASE: ${{ vars.LITELLM_PROXY_API_BASE }}
  LITELLM_PROXY_API_KEY: ${{ secrets.LITELLM_PROXY_API_KEY }}
  LITELLM_MODEL_NAME: ${{ vars.LITELLM_MODEL_NAME }}

jobs:
  garak-scan:
    name: Garak Red Team Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install garak and dependencies
        run: uv sync --extra redteam

      - name: Run Garak scan
        env:
          GARAK_PROBES: ${{ github.event.inputs.probes || 'dan,promptinject,latentinjection,leakreplay,exploitation,refusal,goodside,grandma,atkgen' }}
        run: |
          uv run garak \
            --target_type litellm \
            --target_name "$LITELLM_MODEL_NAME" \
            --generator_options "{\"api_base\": \"$LITELLM_PROXY_API_BASE\", \"api_key\": \"$LITELLM_PROXY_API_KEY\", \"provider\": \"openai\"}" \
            -p "$GARAK_PROBES" \
            --report garak-results.sarif

      - name: Upload Garak SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garak-sarif
          path: garak-results.sarif
          retention-days: 30

      - name: Upload full Garak reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garak-full-reports
          path: |
            garak-*.json
            garak-*.ndjson
          retention-days: 30

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: garak-results.sarif
          category: garak-red-team
