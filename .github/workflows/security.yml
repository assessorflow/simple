name: Security Analysis

on:
  workflow_dispatch:

jobs:
  bandit-scan:
    name: Bandit Python Linting
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Bandit
        run: pip install bandit

      - name: Generate Bandit JSON
        run: bandit -r . --format json --output bandit-results.json --exclude tests,venv,env,build,dist,.git

      - name: Convert Bandit JSON to SARIF
        run: |
          BANDIT_VERSION=$(bandit --version 2>/dev/null | grep -oP '\d+\.\d+\.\d+' | head -1)
          python3 << EOF
          import json
          version = '${BANDIT_VERSION}'

          with open("bandit-results.json") as f:
            data = json.load(f)

          sarif = {
            "version": "2.1.0",
            "$schema": "https://docs.oasis-open.org/sarif/sarif/v2.1.0/errata01/os/schemas/sarif-schema-2.1.0.json",
            "runs": [{
              "tool": {
                "driver": {
                  "name": "Bandit",
                  "version": version,
                  "informationUri": "https://bandit.readthedocs.io/",
                  "rules": []
                }
              },
              "results": []
            }]
          }

          severity_map = {"LOW": "note", "MEDIUM": "warning", "HIGH": "error"}

          for issue in data.get("results", []):
            rule_id = issue.get("test_id", "UNKNOWN")
            severity = issue.get("severity", "MEDIUM")
            rule = {
              "id": rule_id,
              "name": issue.get("test_name", "unknown"),
              "shortDescription": {"text": issue.get("issue_text", "")},
              "properties": {"tags": [severity.lower()] if severity else []}
            }
            if rule not in sarif["runs"][0]["tool"]["driver"]["rules"]:
              sarif["runs"][0]["tool"]["driver"]["rules"].append(rule)

            result = {
              "ruleId": rule_id,
              "level": severity_map.get(issue.get("severity", "MEDIUM"), "warning"),
              "message": {"text": issue.get("issue_text", "")},
              "locations": [{
                "physicalLocation": {
                  "artifactLocation": {"uri": issue.get("filename", "")},
                  "region": {"startLine": issue.get("line_number", 1)}
                }
              }]
            }
            sarif["runs"][0]["results"].append(result)

          with open("bandit-results.sarif", "w") as f:
            json.dump(sarif, f, indent=2)
          EOF

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Generate requirements file
        run: uv export --format requirements-txt --output-file requirements.txt

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        id: Depcheck
        with:
          project: 'python-project'
          path: 'requirements.txt'
          format: 'HTML'
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload Test results
        uses: actions/upload-artifact@v7
        with:
           name: Depcheck report
           path: ${{github.workspace}}/reports

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
